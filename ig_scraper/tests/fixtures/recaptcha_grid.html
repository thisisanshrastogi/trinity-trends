<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Fake reCAPTCHA grid (CI fixture)</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #fafafa; padding: 24px; }
    #rc-imageselect { width: 360px; border: 1px solid #ccc; background: #fff; }
    .rc-imageselect-desc-wrapper { background: #1a73e8; color: #fff; padding: 16px; }
    #rc-imageselect-target { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .rc-imageselect-tile {
      width: 100%; aspect-ratio: 1; background: #888;
      border: 2px solid transparent; cursor: pointer; position: relative;
    }
    .rc-imageselect-tile.selected,
    .rc-imageselect-tile.rc-imageselect-tileselected {
      border-color: #1a73e8; outline: 2px solid #1a73e8;
    }
    .rc-imageselect-tile[data-match="1"] { background: #4caf50; }
    .rc-imageselect-tile[data-match="0"] { background: #9e9e9e; }
    #status { margin-top: 12px; font-weight: 600; }
    #recaptcha-verify-button {
      margin: 12px; padding: 10px 20px; background: #1a73e8; color: #fff; border: 0;
      cursor: pointer; font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="rc-imageselect">
    <div class="rc-imageselect-desc-wrapper">
      Select all squares with <strong>motorcycles</strong>
      <div>If there are none, click skip</div>
    </div>
    <div id="rc-imageselect-target">
      <!-- 3x3: tiles 0,4,8 match "motorcycles" for deterministic mock tests -->
      <div class="rc-imageselect-tile" data-index="0" data-match="1"></div>
      <div class="rc-imageselect-tile" data-index="1" data-match="0"></div>
      <div class="rc-imageselect-tile" data-index="2" data-match="0"></div>
      <div class="rc-imageselect-tile" data-index="3" data-match="0"></div>
      <div class="rc-imageselect-tile" data-index="4" data-match="1"></div>
      <div class="rc-imageselect-tile" data-index="5" data-match="0"></div>
      <div class="rc-imageselect-tile" data-index="6" data-match="0"></div>
      <div class="rc-imageselect-tile" data-index="7" data-match="0"></div>
      <div class="rc-imageselect-tile" data-index="8" data-match="1"></div>
    </div>
    <button id="recaptcha-verify-button" type="button">NEXT</button>
  </div>
  <div id="status">pending</div>
  <script>
    const tiles = [...document.querySelectorAll('.rc-imageselect-tile')];
    tiles.forEach(t => {
      t.addEventListener('click', () => {
        t.classList.toggle('selected');
        t.classList.toggle('rc-imageselect-tileselected');
      });
    });
    document.getElementById('recaptcha-verify-button').addEventListener('click', () => {
      const selected = tiles.filter(t => t.classList.contains('selected'));
      const correct = tiles.filter(t => t.dataset.match === '1');
      const ok =
        selected.length === correct.length &&
        correct.every(t => t.classList.contains('selected'));
      document.getElementById('status').textContent = ok ? 'solved' : 'incorrect';
      if (ok) {
        document.getElementById('rc-imageselect').remove();
      }
    });
  </script>
</body>
</html>
